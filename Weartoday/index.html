<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FEFDE5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Daily Hue">
    
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">

    <title>THE DAILY HUE | City Boy Color Palette</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #FEFDE5;
            --popeye-yellow: #EAFF00;
            --popeye-red: #A81915;
            --ink-black: #1a1a1a;
            --border-thick: 3px solid var(--ink-black);
            --shadow-hard: 6px 6px 0px var(--ink-black);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--ink-black);
            font-family: 'Space Mono', monospace;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- MARQUEE --- */
        .marquee-container {
            background: var(--ink-black);
            color: #fff;
            padding: 8px 0;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: var(--border-thick);
        }
        .marquee-content {
            display: inline-block;
            animation: marquee 20s linear infinite;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* --- HEADER --- */
        header {
            text-align: center;
            padding: 30px 20px 20px;
        }
        h1.logo {
            font-family: 'Dela Gothic One', cursive;
            font-size: clamp(2.5rem, 12vw, 8rem);
            line-height: 0.9;
            color: var(--popeye-yellow);
            -webkit-text-stroke: 2px var(--ink-black);
            text-shadow: 4px 4px 0px var(--ink-black);
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        /* --- GRID --- */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            max-width: 1200px;
            margin: 0 auto;
            gap: 30px;
            padding: 15px;
        }

        .challenge-box {
            background: #fff;
            border: var(--border-thick);
            box-shadow: var(--shadow-hard);
        }

        .box-header {
            background: var(--ink-black);
            color: #fff;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
        }

        .palette-display {
            display: flex;
            height: 350px;
        }

        .swatch {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 15px;
            border-right: var(--border-thick);
        }
        .swatch:last-child { border-right: none; }

        .swatch-info {
            background: #fff;
            border: 2px solid var(--ink-black);
            padding: 8px;
            font-size: 0.7rem;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
            transform: rotate(-2deg);
        }

        .control-area {
            padding: 25px;
            text-align: center;
            background: repeating-linear-gradient(45deg, #fff, #fff 10px, #f0f0f0 10px, #f0f0f0 20px);
            border-top: var(--border-thick);
        }

        button#generate-btn {
            background: var(--popeye-yellow);
            border: var(--border-thick);
            font-family: 'Dela Gothic One', cursive;
            font-size: 1.2rem;
            padding: 15px 30px;
            width: 100%;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--ink-black);
            color: var(--ink-black);
        }

        /* --- RED CARD --- */
        .red-card {
            background: var(--popeye-red);
            color: #fff;
            border: var(--border-thick);
            box-shadow: var(--shadow-hard);
            padding: 25px;
            text-align: center;
            height: fit-content;
        }
        .date-display { font-family: 'Dela Gothic One', cursive; font-size: 1.5rem; }

        /* --- FOOTER & BMC --- */
        footer {
            margin-top: 50px;
            padding: 40px 20px;
            text-align: center;
            border-top: var(--border-thick);
            background: #fff;
        }
        .bmc-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: var(--ink-black);
            color: #fff;
            text-decoration: none;
            font-family: 'Dela Gothic One', cursive;
            font-size: 0.9rem;
            border: 2px solid var(--ink-black);
        }
        .bmc-link:active {
            background: var(--popeye-yellow);
            color: var(--ink-black);
        }

        /* --- MOBILE --- */
        @media (max-width: 900px) {
            .grid-container { grid-template-columns: 1fr; }
            .palette-display { flex-direction: column; height: 450px; }
            .swatch { border-right: none; border-bottom: var(--border-thick); height: 33.3%; }
            .red-card { display: flex; align-items: center; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <div class="marquee-container">
        <div class="marquee-content">
            CITY BOY STYLE CHECK • WHAT COLOR SHOULD I WEAR TODAY? • 3 COLOR COMBO CHALLENGE • CITY BOY STYLE CHECK • 
        </div>
    </div>

    <header>
        <h1 class="logo">THE DAILY HUE</h1>
        <p style="font-weight: bold; font-size: 0.8rem;">COLOR COMBO CHALLENGE</p>
    </header>

    <div class="grid-container">
        <main class="challenge-box">
            <div class="box-header"><span>Dictionary of Color Combinations</span><span>VOL. 01</span></div>
            <div class="palette-display" id="palette"></div>
            <div class="control-area">
                <button id="generate-btn" onclick="generatePalette()">RANDOMIZE</button>
            </div>
        </main>

        <aside class="red-card">
            <div style="font-size: 2.5rem; border: 2px solid #fff; border-radius: 50%; width: 50px; height: 50px; line-height: 45px;">R</div>
            <div class="date-display" id="date-display"></div>
            <div style="font-size: 0.8rem;">Jakarta, ID</div>
        </aside>
    </div>

    <footer>
        <p>MADE BY VIAN IN JAKARTA</p>
        <a href="https://buymeacoffee.com/vianstory" target="_blank" class="bmc-link">
            ☕ BUY ME A COFFEE
        </a>
    </footer>

    <script>
        const palettes = [
            [{name:"English Red",hex:"#AB4B52"},{name:"Ocious Salmon",hex:"#FF8E88"},{name:"Mushroom",hex:"#7E766C"}],
            [{name:"Cobalt Green",hex:"#3D8C69"},{name:"Pale Lemon",hex:"#FFF8C9"},{name:"Slate Grey",hex:"#404040"}],
            [{name:"Navy Blue",hex:"#000080"},{name:"Mustard",hex:"#FFDB58"},{name:"Cream",hex:"#FFFDD0"}],
            [{name:"Burnt Orange",hex:"#CC5500"},{name:"Olive Drab",hex:"#6B8E23"},{name:"Khaki",hex:"#F0E68C"}],
            [{name:"Violet Blue",hex:"#625D96"},{name:"Sand",hex:"#C2B280"},{name:"White",hex:"#FFFFFF"}]
        ];

        function generatePalette() {
            const paletteContainer = document.getElementById('palette');
            const selectedPalette = palettes[Math.floor(Math.random() * palettes.length)];
            paletteContainer.innerHTML = '';
            selectedPalette.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'swatch';
                swatch.style.backgroundColor = color.hex;
                swatch.innerHTML = `<div class="swatch-info"><strong>${color.name}</strong><br>${color.hex}</div>`;
                paletteContainer.appendChild(swatch);
            });
        }

        function setDate() {
            const now = new Date();
            document.getElementById('date-display').innerHTML = `${now.getFullYear()}年<br>${now.getMonth() + 1}月${now.getDate()}日`;
        }

        window.onload = () => { generatePalette(); setDate(); };
    </script>
</body>
</html>
